services:
  - type: web
    name: thecrew-inventory
    runtime: docker
    repo: https://github.com/dylanbc1/thecrew-inventory
    plan: starter
    envVars:
      - key: API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SCRAPE_URL
        value: https://www.thecrewautos.com/inventory/
      - key: CACHE_TTL_MINUTES
        value: "10"
